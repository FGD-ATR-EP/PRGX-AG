name: self_healing
mode: pr_first
runtime_profile: staging
dry_run: true
steps:
  - scan
  - translate_intent
  - policy_audit
  - execute_safe_fix
  - verify
  - report
  - rsi_feedback
verification:
  commands:
    - python -m compileall src
    - python scripts/ci/check_typos.py
    - python scripts/ci/check_console_docs_consistency.py
    - npm --prefix web ci && npm --prefix web run test:web
    - pytest -q tests/test_pipeline_integration.py tests/test_nexus_cycle.py --maxfail=1
artifacts:
  include:
    - .prgx-ag/audit/
    - .prgx-ag/evidence/
    - .prgx-ag/state/
