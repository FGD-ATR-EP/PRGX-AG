name: proof-html

on:
  push:
    paths:
      - 'index.html'
      - 'web/**'
      - '.github/workflows/proof-html.yml'
  pull_request:
    paths:
      - 'index.html'
      - 'web/**'
      - '.github/workflows/proof-html.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: proof-html-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate HTML proofs
        uses: anishathalye/proof-html@v2
        with:
          directory: ./
