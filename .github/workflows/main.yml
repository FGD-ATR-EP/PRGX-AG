name: prgx-main

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: scan-only | once | test-only"
        required: false
        default: "once"
      dry_run:
        description: "Dry run mode"
        required: false
        default: "true"
      target_environment:
        description: "GitHub Environment: development | staging | production"
        required: false
        default: "staging"
      runtime_profile:
        description: "Runtime profile: development | staging | production"
        required: false
        default: "staging"
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

concurrency:
  group: prgx-main-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PRGX_AG_ENV: "ci"
  PRGX_AUDIT_WINDOW_HOURS: "24"

jobs:
  runtime-cycle:
    name: Runtime cycle
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || 'staging' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set workflow env from dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "PRGX_WORKFLOW_MODE=${{ github.event.inputs.mode }}" >> "$GITHUB_ENV"
          echo "PRGX_AG_DRY_RUN=${{ github.event.inputs.dry_run }}" >> "$GITHUB_ENV"
          echo "PRGX_RUNTIME_PROFILE=${{ github.event.inputs.runtime_profile }}" >> "$GITHUB_ENV"

      - name: Set scheduled defaults
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "PRGX_WORKFLOW_MODE=once" >> "$GITHUB_ENV"
          echo "PRGX_AG_DRY_RUN=true" >> "$GITHUB_ENV"
          echo "PRGX_RUNTIME_PROFILE=staging" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev] ruff mypy

      - name: Prepare artifact directories
        run: mkdir -p .prgx-ag/artifacts .prgx-ag/audit .prgx-ag/state .prgx-ag/evidence

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Run PRGX scan-only
        if: env.PRGX_WORKFLOW_MODE != 'test-only'
        run: python -m prgx_ag.main --scan-only | tee .prgx-ag/artifacts/prgx-scan.log

      - name: Run PRGX once cycle
        if: env.PRGX_WORKFLOW_MODE == 'once'
        run: python -m prgx_ag.main --once | tee .prgx-ag/artifacts/prgx-once.log

      - name: Run tests
        if: env.PRGX_WORKFLOW_MODE != 'scan-only'
        run: pytest -q --maxfail=1 --disable-warnings | tee .prgx-ag/artifacts/pytest.log

      - name: Upload PRGX artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prgx-main-artifacts-${{ github.run_id }}
          path: |
            .prgx-ag/artifacts/**
            .prgx-ag/audit/**
            .prgx-ag/evidence/**
            .prgx-ag/state/**
          if-no-files-found: warn
          include-hidden-files: true
