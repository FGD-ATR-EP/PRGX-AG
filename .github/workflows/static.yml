name: deploy-console-pages

on:
  push:
    branches: [main]
    paths:
      - 'index.html'
      - 'web/**'
      - 'package.json'
      - '.github/workflows/static.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build static bundle directory
        run: |
          mkdir -p .site/web
          cp index.html .site/index.html
          cp -R web/* .site/web/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
